<!DOCTYPE html>
<html>
<head>
    <title>Schätz GPT v0.0.2</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>
    <!-- --------------------------------------------------------------- -->
    <div id="start-screen">
        <h1>Schätz GPT v0.0.2</h1>
        <div class="input-container">
            <label for="player1Name"> 🎮 </label>
            <input type="text" id="player1Name" placeholder="Spieler 1">
        </div>
        <div class="input-container">
            <label for="player1Name"> 🎮 </label>
            <input type="text" id="player2Name" placeholder="Spieler 2">
        </div>
        <div class="input-container">
            <label for="rounds-select">Rundenanzahl:</label>
            <select id="rounds-select">
                <option value="3" selected>3 Runden</option>
                <option value="5">5 Runden</option>
                <option value="7">7 Runden</option>  
                <option value="10">10 Runden</option>
            </select>
        </div>
        <p></p>
        <button onclick="startGame()">Spiel starten</button>
    </div>
    
    <!-- --------------------------------------------------------------- -->
    <div id="game-screen" class="hidden">
        <h1 id="frage-n-text"></h1>
        <h1 id="question-text"></h1>
        <div class="input-container">
            <h1 id ="player1Label"></h1>
            <h1 id ="player1PointsLabel"></h1>
            <input type="number" id="player1Input" placeholder="..." min="0">
            <button onclick="lockAnswer(1)">Bestätigen</button>
        </div>
        <div class="input-container">
            <h1 id ="player2Label"></h1>
            <h1 id ="player2PointsLabel"></h1>
            <input type="number" id="player2Input" placeholder="..." min="0">
            <button onclick="lockAnswer(2)">Bestätigen</button>
        </div>
        <div id="answer-div" class="hidden">
            <h1 id ="answer-text"></h1>
            <h2 id="round-winner-text"></h2>
            <button onclick="nextRoundOrScores()">Weiter</button>
        </div>
    </div>
    
  <!-- --------------------------------------------------------------- -->
    <div id="scores-screen" class="hidden">
        <h1 id="winner"></h1>
        <div id="scores"></div>
        <button onclick="newGame()">Neues Spiel</button>
    </div>
    
  <!-- --------------------------------------------------------------- -->
    <script src="script.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</body>
</html>
